<html>

<head>

</head>

<body>
    <div class="container">
        <div class="row">
            <div class="loader">

        <source src="music.mp3">
        </source>
        Your browser isn't invited for super fun audio time.

    <canvas id="confetti"></canvas>
    <div class="main">
        <div class="container pt-5">
            <div class="row">

                <div class="col-12 col-xl-6 mx-auto">
                    <img src="img/banner.png" alt="">
                    <!-- Cake container jisme mobile par sahi space bane -->
<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; width: 100%; position: relative; margin: 20px 0;">
    
    <!-- Aapka cake image tag (style attribute ke sath) -->
    <img src="img/banner.png" alt="" style="max-width: 80%; height: auto; display: block; position: relative !important; top: 0 !important; left: 0 !important; margin: 0 auto 20px auto !important;">
    
    <!-- Niche wala text jo chhup raha hai (iske upar margin-top force kiya hai) -->
    <div style="margin-top: 30px !important; position: relative !important; clear: both !important; width: 100%; padding: 0 15px;">
        <h3 style="color: #bc6c25; font-size: 20px;">Filled with joy and happiness.</h3>
    </div>
</div>
                </div>

                <div class="col-12  text-center">
                    <div id="name" class="area">Mere Cutuu Princess😘😘</div>
                </div>

                <div class="col-12 text-center">
                    <div class="type-wrap">
                        <div id="typed-strings" class="typing">

                            <h2>Filled with joy and happiness.</h2>
                        </div>
                        <span id="typed" style="white-space:pre;"></span>
                    </div>
                </div>

                <div class="col-12 col-xl-3 cake">
                    <img src="img/cake.gif" alt="">
                </div>
            </div>
        </div>
        <img src="img/Balloon-Border.png" width="100%" class="balloon-border">
    </div>
