<!DOCTYPE html>
<html>

<head>
    <title>Happy Birthday</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="loader">
                <button id="play">Start</button>
            </div>
        </div>
    </div>
    
    <audio class="song" controls loop>
        <source src="music.mp3"></source>
        Your browser isn't invited for super fun audio time.
    </audio>
    
    <canvas id="confetti"></canvas>
    
    <div class="main">
        <div class="container pt-3">
            <div class="row">
                <!-- Sabse upar mobile friendly responsive layout wrapper -->
                <div class="col-12 col-md-8 mx-auto" style="display: flex; flex-direction: column; align-items: center; text-align: center;">
                    
                    <!-- 1. Sabse upar main Heading Name -->
                    <div id="name" class="area" style="font-size: 28px !important; line-height: 1.3 !important; margin-bottom: 20px !important; display: block !important; position: relative !important;">
                        Mere Cutuu Princess😘😘
                    </div>

                    <!-- 2. Beech me Cake/Banner Container (Sahi spacing ke sath) -->
                    <div class="cake-container" style="width: 100%; display: flex; justify-content: center; margin: 15px 0 25px 0 !important; position: relative !important; clear: both !important;">
                        <!-- Purani extra images hata kar sirf ek main cake gif ko clean formatting di hai -->
                        <img src="img/cake.gif" alt="Cake" style="max-width: 75%; height: auto; display: block; position: relative !important;">
                    </div>

                    <!-- 3. Sabse Niche Aapka Animated Typing Text -->
                    <div class="type-wrap" style="width: 100%; position: relative !important; display: block !important; margin-top: 10px !important; z-index: 10 !important;">
                        <!-- Hidden strings jisse typed.js text read karega -->
                        <div id="typed-strings" class="typing" style="display: none;">
                            <h2>Happy Birthday <i id="nae">Mere Princess😘😘</i></h2>
                            <h2>Have a wonderful day</h2>
                            <h2>Filled with joy and happiness.</h2>
                        </div>
                        <!-- Ye wo span hai jahan text live type hota hua dikhega -->
                        <span id="typed" style="white-space:pre; font-size: 20px; font-weight: bold; display: block; width: 100%;"></span>
                    </div>

                </div>
            </div>
        </div>
        <img src="img/Balloon-Border.png" width="100%" class="balloon-border" style="position: fixed; bottom: 0; left: 0; z-index: 1;">
    </div>
</body>

<script src="https://unpkg.com/magic-snowflakes/dist/snowflakes.min.js"></script>
<script src="js/jquery.js"></script>
<script src="Happy Birthday_files/typed.min.js"></script>
<script src="Happy Birthday_files/script.js"></script>

</html>
