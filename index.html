<!DOCTYPE html>
<html lang="en">

<head>
    <title>Happy Birthday</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="loader">
                <button id="play">Start</button>
            </div>
        </div>
    </div>
    
    <audio class="song" controls loop>
        <source src="music.mp3"></source>
        Your browser isn't invited for super fun audio time.
    </audio>
    
    <canvas id="confetti"></canvas>
    
    <div class="main">
        <div class="container pt-3">
            <div class="row">
                <!-- Mobile friendly responsive layout wrapper -->
                <div class="col-12 col-md-8 mx-auto" style="display: flex; flex-direction: column; align-items: center; text-align: center; padding-bottom: 80px;">
                    
                    <!-- 1. Sabse upar Heading Name -->
                    <div id="name" class="area" style="font-size: 26px !important; line-height: 1.4 !important; margin-top: 50px !important; margin-bottom: 20px !important; display: block !important; position: relative !important; font-weight: bold; width: 100%; letter-spacing: 1px !important;">
                        Mere Cutuu <br> Princess 😘😘
                    </div>

                    <!-- 2. Beech me Cake ki Image -->
                    <div class="cake-container" style="width: 100%; display: flex; justify-content: center; margin: 15px 0 25px 0 !important; position: relative !important;">
                        <img src="img/cake.gif" alt="Cake" style="max-width: 75%; height: auto; display: block; position: relative !important;">
                    </div>

                    <!-- 3. Fixed Static Text Container (Taaki CSS override na ho) -->
                    <div style="width: 100%; position: relative !important; display: block !important; margin-top: 15px !important; padding: 0 10px; z-index: 999 !important;">
                        <h2 style="color: #d66870; font-size: 24px !important; margin-bottom: 12px !important; font-weight: bold; line-height: 1.4;">
                            Happy Birthday <i>Mere Princess</i> 😘😘
                        </h2>
                        <p style="color: #bc6c25; font-size: 19px !important; line-height: 1.5 !important; margin: 6px 0 !important; font-weight: 500;">
                            Have a wonderful day
                        </p>
                        <p style="color: #bc6c25; font-size: 19px !important; line-height: 1.5 !important; margin: 6px 0 !important; font-weight: 500;">
                            Filled with joy and happiness.
                        </p>
                    </div>

                    <!-- Hidden strings for JS backup -->
                    <div id="typed-strings" class="typing" style="display: none;">
                        <h2>Happy Birthday <i id="nae">Mere Princess😘😘</i></h2>
                        <h2>Have a wonderful day</h2>
                        <h2>Filled with joy and happiness.</h2>
                    </div>
                    <span id="typed" style="white-space:pre; display: none;"></span>

                </div>
            </div>
        </div>
        <img src="img/Balloon-Border.png" width="100%" class="balloon-border" style="position: fixed; bottom: 0; left: 0; z-index: 1; pointer-events: none;">
    </div>
</body>

<script src="https://unpkg.com/magic-snowflakes/dist/snowflakes.min.js"></script>
<script src="js/jquery.js"></script>
<script src="Happy Birthday_files/typed.min.js"></script>
<script src="Happy Birthday_files/script.js"></script>

</html>
